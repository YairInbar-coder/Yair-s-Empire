<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yair's Empire</title>
    <link rel="stylesheet" href="publicStyle.css" />
    <link rel="stylesheet" href="mainStyle.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Coral+Pixels&family=Faster+One&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Honk:MORF@15&family=Nabla&family=Noto+Sans+Hebrew:wght@100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Silkscreen:wght@400;700&display=swap");
    </style>
    <style>
      .drop1 {
        position: relative;
        left: 350px;
        top: -82px;
        border-radius: 50px;

        p {
          font-family: "silkscreen";
          font-size: 35px;
        }

        button {
          font-family: "impact";
          font-size: 25px;
          border-radius: 15px;
          background: linear-gradient(to left, beige 10%, lightcoral 90%);
          border-color: blue;
        }
      }
    </style>
  </head>
  <body>
    <div class="TopPanel">
      <p id="title">Yair's Empire</p>
      <dropdown dynamic class="drop1">
        <p id="dtx1">Games &#x2193;</p>
        <button id="1.0">Games Menu</button>
        <button id="1.1">Johnny The Runner</button>
        <button id="1.2">Flappy Blobfish</button>
        <button id="1.3">Tower Tycoon (Roblox)</button>
      </dropdown>
    </div>
    <script>
      const drop1t = document.getElementById("dtx1");

      drop1t.parentElement.addEventListener("mouseenter", function () {
        drop1t.innerHTML = "Games &#x2191;";
      });

      drop1t.parentElement.addEventListener("mouseleave", function () {
        drop1t.innerHTML = "Games &#x2193;";
      });

      const a0 = document.getElementById("1.0");
      const a1 = document.getElementById("1.1");
      const a2 = document.getElementById("1.2");
      const a3 = document.getElementById("1.3");

      a0.addEventListener("click", function () {
        window.location.href = "games/menu.html";
      });

      a1.addEventListener("click", function () {
        window.location.href = "games/menu.html"
      });

      a2.addEventListener("click", function () {
        window.location.href = "games/menu.html#fb";

      });
    </script>
  </body>
</html>
